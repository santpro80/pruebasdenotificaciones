<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0f16" />
    <title>Archivo de Ingeniería - Pedidos Internos</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
        rel="stylesheet" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { 'villalba-blue': '#2563eb', 'background-dark': '#0a0f16', 'surface-dark': '#161e2a' },
                    fontFamily: { sans: ['"Public Sans"', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body {
            opacity: 0;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-[#6e8efb] to-[#a777e3] dark:from-[#0a0f16] dark:to-[#0a0f16] text-slate-900 dark:text-[#f1f5f9] antialiased font-sans transition-colors duration-300">
    <div id="app-container" class="flex h-screen overflow-hidden">
        <!-- Sidebar overlay -->
        <div id="side-drawer-overlay"
            class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden transition-opacity"
            onclick="document.getElementById('side-drawer').classList.add('-translate-x-full'); this.classList.add('hidden')">
        </div>

        <!-- Sidebar container -->
        <aside id="side-drawer"
            class="fixed inset-y-0 left-0 z-[100] w-72 transform -translate-x-full bg-white dark:bg-background-dark border-r border-slate-200 dark:border-slate-800 transition-transform duration-300 ease-in-out shadow-2xl">
        </aside>

        <!-- Main content area -->
        <main class="flex-1 overflow-y-auto relative p-0" id="main-content">
            <div id="loading-state"
                class="h-full w-full flex flex-col items-center justify-center text-slate-400 gap-4 mt-20">
                <span class="material-symbols-outlined text-4xl animate-spin text-villalba-blue">sync</span>
            </div>

            <header
                class="bg-white/80 dark:bg-[#0a0f16]/80 backdrop-blur-md shadow-sm border-b border-white/20 dark:border-white/10 px-4 lg:px-8 py-3 flex items-center justify-between gap-4 sticky top-0 z-40 shrink-0 w-full transition-colors">
                <div class="flex items-center gap-4">
                    <button
                        onclick="document.getElementById('side-drawer').classList.remove('-translate-x-full'); document.getElementById('side-drawer-overlay').classList.remove('hidden');"
                        class="p-2 rounded-xl text-slate-600 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors flex items-center justify-center">
                        <span class="material-symbols-outlined text-[20px]">menu</span>
                    </button>
                    <button onclick="window.location.href='menu.html'"
                        class="p-2 rounded-xl text-slate-600 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors flex items-center justify-center">
                        <span class="material-symbols-outlined text-[20px]">arrow_back</span>
                    </button>
                    <div
                        class="size-8 rounded-xl bg-gradient-to-br from-villalba-blue to-blue-800 flex items-center justify-center text-white font-black text-sm shadow-lg shadow-blue-500/30">
                        <span class="material-symbols-outlined text-[16px]">insert_chart</span>
                    </div>
                    <h1 class="text-xl font-bold tracking-tighter uppercase text-villalba-blue dark:text-white mt-1">
                        estadistica</h1>
                </div>
                <div class="flex items-center gap-4">
                    <span id="reports-total-count"
                        class="text-[10px] font-black text-villalba-blue dark:text-blue-400 uppercase tracking-widest bg-blue-500/10 px-3 py-1.5 rounded-lg border border-blue-500/20">...</span>
                </div>
            </header>

            <div id="reports-container" class="max-w-7xl mx-auto pb-32 px-4 lg:px-8 pt-8">
                <div class="mb-10">
                    <div class="flex flex-col md:flex-row gap-4 max-w-[800px] mx-auto mb-8">
                        <div class="relative flex-1">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-lg">search</span>
                            <input type="text" id="report-search" placeholder="Buscar en el archivo histórico..."
                                class="w-full pl-12 pr-4 h-14 bg-white/90 dark:bg-surface-dark border-0 shadow-sm rounded-xl text-base outline-none focus:ring-2 focus:ring-villalba-blue/50 transition-all font-bold text-slate-900 dark:text-white" />
                        </div>
                        <div class="relative w-full md:w-64">
                            <select id="filter-sector"
                                class="w-full pl-4 pr-10 h-14 bg-white/90 dark:bg-surface-dark border-0 shadow-sm rounded-xl text-sm outline-none focus:ring-2 focus:ring-villalba-blue/50 transition-all font-bold text-slate-900 dark:text-white appearance-none cursor-pointer">
                                <option value="">Todos los Sectores</option>
                                <option value="Mecanizado">Mecanizado</option>
                                <option value="Depósito">Depósito</option>
                                <option value="Dirección Técnica">Dirección Técnica</option>
                                <option value="Lavado">Lavado</option>
                                <option value="Reacondicionamiento de Cajas">Reacondicionamiento de Cajas</option>
                                <option value="Pulido">Pulido</option>
                                <option value="Reparación de Cajas">Reparación de Cajas</option>
                                <option value="Oficina Técnica">Oficina Técnica</option>
                                <option value="Logística">Logística</option>
                                <option value="Expedición">Expedición</option>
                                <option value="Reacondicionamiento de Motores">Reacondicionamiento de Motores</option>
                                <option value="Laboratorio">Laboratorio</option>
                                <option value="Comercio">Comercio</option>
                                <option value="Sucursales">Sucursales</option>
                            </select>
                            <span
                                class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none">filter_list</span>
                        </div>
                    </div>

                    <!-- Action buttons -->
                    <div class="flex justify-center mb-10 max-w-sm mx-auto">
                        <button onclick="window.reports.exportToCSV()"
                            class="w-full py-4 bg-white/20 backdrop-blur-md text-white border border-white/30 rounded-2xl font-black text-xs uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-white/30 transition-all shadow-lg active:scale-95">
                            <span class="material-symbols-outlined text-[20px]">download_for_offline</span> Exportar
                            CSV
                        </button>
                    </div>
                </div>

                <!-- Priority Columns Container -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <!-- High Priority -->
                    <div class="flex flex-col">
                        <div
                            class="flex items-center justify-between mb-4 px-4 py-3 bg-white/95 dark:bg-surface-dark backdrop-blur-sm rounded-2xl shadow-sm border border-slate-200/50 dark:border-white/5">
                            <h2
                                class="text-sm font-black text-rose-500 uppercase tracking-widest flex items-center gap-2">
                                <span class="material-symbols-outlined text-[18px]">priority_high</span> <span
                                    class="text-[10px] text-slate-400 font-bold uppercase mr-[-4px]">Prioridad:</span>
                                Alta
                            </h2>
                            <span id="count-alta"
                                class="text-xs font-bold text-slate-500 bg-slate-100 dark:bg-slate-800 px-2.5 py-1 rounded-full">0</span>
                        </div>
                        <div id="orders-high" class="space-y-4"></div>
                    </div>

                    <!-- Medium Priority -->
                    <div class="flex flex-col">
                        <div
                            class="flex items-center justify-between mb-4 px-4 py-3 bg-white/95 dark:bg-surface-dark backdrop-blur-sm rounded-2xl shadow-sm border border-slate-200/50 dark:border-white/5">
                            <h2
                                class="text-sm font-black text-amber-500 uppercase tracking-widest flex items-center gap-2">
                                <span class="material-symbols-outlined text-[18px]">flag</span> <span
                                    class="text-[10px] text-slate-400 font-bold uppercase mr-[-4px]">Prioridad:</span>
                                Media
                            </h2>
                            <span id="count-media"
                                class="text-xs font-bold text-slate-500 bg-slate-100 dark:bg-slate-800 px-2.5 py-1 rounded-full">0</span>
                        </div>
                        <div id="orders-medium" class="space-y-4"></div>
                    </div>

                    <!-- Low Priority -->
                    <div class="flex flex-col">
                        <div
                            class="flex items-center justify-between mb-4 px-4 py-3 bg-white/95 dark:bg-surface-dark backdrop-blur-sm rounded-2xl shadow-sm border border-slate-200/50 dark:border-white/5">
                            <h2
                                class="text-sm font-black text-emerald-500 uppercase tracking-widest flex items-center gap-2">
                                <span class="material-symbols-outlined text-[18px]">low_priority</span> <span
                                    class="text-[10px] text-slate-400 font-bold uppercase mr-[-4px]">Prioridad:</span>
                                Baja
                            </h2>
                            <span id="count-baja"
                                class="text-xs font-bold text-slate-500 bg-slate-100 dark:bg-slate-800 px-2.5 py-1 rounded-full">0</span>
                        </div>
                        <div id="orders-low" class="space-y-4"></div>
                    </div>
                </div>

                <div id="no-results-msg" class="hidden py-20 text-center text-white font-bold col-span-full w-full">
                    No se encontraron pedidos en el archivo.</div>
            </div>
    </div>
    </main>
    </div>

    <!-- Scripts -->
    <script src="./js/reportes.js" type="module"></script>
    <script type="module">import '../js/theme.js';</script>
</body>

</html>
