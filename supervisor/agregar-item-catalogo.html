<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar al Catálogo | Sistema de Trazabilidad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { 'villalba-blue': '#2563eb' } } }
        }
    </script>
    <link rel="stylesheet" href="../css/dark-theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body { font-family: 'Public Sans', sans-serif; opacity: 0; animation: fadeInMenu 0.4s ease forwards; animation-delay: 0.1s; }
        @keyframes fadeInMenu { to { opacity: 1; } }
        .glass-card { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(0,0,0,0.1); backdrop-filter: blur(12px); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        html.dark .glass-card { background: rgba(22, 30, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: none; }
    </style>
</head>
<body class="bg-gradient-to-br from-[#6e8efb] to-[#a777e3] dark:from-[#0a0f16] dark:to-[#0a0f16] text-slate-900 dark:text-[#f1f5f9] antialiased min-h-screen relative overflow-x-hidden">
    <!-- Navbar Premium -->
    <header class="bg-[#f8fafc] dark:bg-transparent backdrop-blur-md shadow-sm dark:shadow-none border-b border-white/20 dark:border-white/10 px-4 lg:px-8 py-3 flex items-center justify-between sticky top-0 z-40 w-full hover:bg-white/95 transition-colors">
        <button id="back-btn" class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-villalba-blue/10 text-villalba-blue hover:bg-villalba-blue hover:text-white transition-all">
            <span class="material-symbols-outlined text-[20px]">arrow_back</span>
            <span class="text-xs font-bold uppercase tracking-wide hidden sm:inline-block">Volver</span>
        </button>
        <div class="flex items-center gap-3">
            <span id="user-display-name" class="text-sm font-bold text-slate-700 dark:text-slate-300 uppercase tracking-widest hidden md:inline-block">Cargando...</span>
            <div class="h-8 w-8 rounded-full bg-villalba-blue/20 text-villalba-blue flex items-center justify-center font-black">S</div>
        </div>
    </header>

    <main class="w-full max-w-3xl mx-auto px-4 py-8 md:py-16 flex flex-col items-center relative z-10">
        <div class="glass-card rounded-[2.5rem] p-6 text-center w-full shadow-2xl relative mb-12">
            <!-- Icono decorativo -->
            <div class="w-20 h-20 bg-gradient-to-br from-villalba-blue to-blue-400 text-white rounded-3xl mx-auto flex items-center justify-center -mt-16 mb-6 shadow-lg shadow-blue-500/40 relative z-20">
                <span class="material-symbols-outlined text-[40px]">add_task</span>
            </div>
            
            <h1 class="text-2xl md:text-3xl font-black text-slate-800 dark:text-white mb-2 uppercase tracking-tight">Agregar al Catálogo</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm font-medium mb-8 max-w-lg mx-auto">
                Ingresa los ítems que deseas anexar al catálogo, un ítem por línea. Usa el formato exacto de la base de datos.
            </p>

            <div class="bg-indigo-50 dark:bg-indigo-900/20 rounded-2xl p-4 mb-6 border border-indigo-100 dark:border-indigo-500/20 flex flex-col sm:flex-row items-center justify-center gap-3 shadow-inner">
                 <span class="text-xs font-bold text-indigo-800 dark:text-indigo-300 uppercase tracking-widest bg-white dark:bg-indigo-950 px-3 py-1.5 rounded-lg shadow-sm">Formato Requerido:</span>
                 <span class="text-sm text-indigo-600 dark:text-indigo-400 font-mono font-black select-all bg-indigo-100/50 dark:bg-black/20 px-3 py-1 rounded-md border border-indigo-200/50 dark:border-indigo-500/30">codigo;descripcion;estado</span>
            </div>

            <div class="relative w-full text-left">
                <textarea id="items-textarea" rows="8" placeholder="Ej:&#10;4211801;PLACA 1/3 CIRCULO X 4 ORIFICIOS;ACTIVO&#10;4211802;PLACA 1/3 CIRCULO X 5 ORIFICIOS;ACTIVO" class="w-full p-5 rounded-2xl border-2 border-slate-200 dark:border-slate-700 bg-white/50 dark:bg-slate-900/50 text-slate-800 dark:text-slate-200 focus:outline-none focus:ring-0 focus:border-villalba-blue font-mono text-sm leading-relaxed shadow-inner placeholder-slate-400 transition-colors resize-y max-h-[400px] hover:bg-white dark:hover:bg-slate-900/80"></textarea>
                <div class="absolute right-4 bottom-4 flex items-center justify-center w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-400 pointer-events-none">
                    <span class="material-symbols-outlined text-[16px]">edit_note</span>
                </div>
            </div>

            <button id="save-btn" class="w-full md:w-auto mt-8 px-10 py-4 bg-villalba-blue text-white rounded-2xl font-black uppercase tracking-widest text-[13px] hover:bg-blue-700 hover:-translate-y-1 transition-all duration-300 shadow-lg shadow-blue-500/30 flex items-center justify-center gap-3 mx-auto">
                <span class="material-symbols-outlined text-[22px]">cloud_upload</span>
                Guardar en BD
            </button>

            <!-- Indicador de estado -->
            <div id="status-message" class="mt-6 text-[13px] font-black tracking-widest rounded-xl p-4 hidden transition-all duration-300 transform translate-y-4 opacity-0 border"></div>
        </div>
    </main>

    <!-- Partículas de fondo (puramente decorativo para dar toque premium) -->
    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
        <div class="absolute top-1/4 left-10 w-64 h-64 bg-purple-500/10 rounded-full blur-3xl"></div>
        <div class="absolute bottom-1/4 right-10 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl"></div>
    </div>

    <script type="module" src="js/agregar-item-catalogo.js"></script>
    <script type="module">import "../js/theme.js";</script>
</body>
</html>
