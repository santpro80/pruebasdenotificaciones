<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportar Problema | Sistema de Trazabilidad</title>
    <link rel="icon" href="assets/logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'villalba-blue': '#2563eb',
                        'background-dark': '#0a0f16',
                        'surface-dark': '#161e2a'
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; font-family: 'Inter', Arial, sans-serif; background: linear-gradient(135deg, #6e8efb, #a777e3); color: #2c3e50; transition: background 0.3s ease; }
        .app-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 25px; background-color: rgba(255, 255, 255, 0.9); backdrop-filter: blur(5px); box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); position: sticky; top: 0; z-index: 1000; transition: all 0.3s ease; }
        .header-left, .user-info { display: flex; align-items: center; gap: 15px; }
        .user-display-name { font-weight: 500; }
        .btn-back { background-color: #f0f4f8; color: #4285F4; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; transition: all 0.2s; }
        .logout-btn { background-color: #dc3545; color: white; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; transition: transform 0.2s active:scale-95 shadow-md; }
        
        .main-content { padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
        .form-card { background-color: rgba(255, 255, 255, 0.95); border-radius: 15px; padding: 30px 40px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2); transition: all 0.3s ease; }
        .form-card h1 { color: #4285F4; text-align: center; margin-top: 0; }
        .form-card p { text-align: center; margin-bottom: 30px; color: #555; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 500; margin-bottom: 8px; color: #333; }
        input[type="text"], textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em; box-sizing: border-box; transition: all 0.3s; }
        textarea { min-height: 120px; resize: vertical; }
        input:focus, textarea:focus { outline: none; border-color: #4285F4; box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.2); }
        .selection-group { border: 1px solid #ddd; border-radius: 8px; padding: 10px; background-color: #fff; transition: all 0.3s ease; }
        .selection-option { display: flex; align-items: center; padding: 12px; cursor: pointer; border-radius: 6px; transition: all 0.2s; }
        .selection-option:not(:last-child) { border-bottom: 1px solid #eee; }
        .selection-option:hover { background-color: #f8f9fa; }
        .selection-option input[type="checkbox"] { margin-right: 15px; width: 1.2em; height: 1.2em; accent-color: #4285F4; cursor: pointer; }
        .selection-option label { margin-bottom: 0; font-weight: normal; flex-grow: 1; cursor: pointer; }
        .btn-save { background-color: #28a745; color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1em; width: 100%; margin-top: 20px; font-weight: bold; transition: all 0.2s; }

        body { opacity: 0; animation: fadeInMenu 0.4s ease forwards; animation-delay: 0.15s; }
        @keyframes fadeInMenu { to { opacity: 1; } }
    </style>
    <link rel="stylesheet" href="../css/dark-theme.css">
    <script type="module" src="../js/theme.js"></script>
</head>
<body class="bg-gradient-to-br from-[#6e8efb] to-[#a777e3] dark:from-[#0a0f16] dark:to-[#0a0f16] text-slate-900 dark:text-[#f1f5f9] antialiased transition-colors duration-300">
    <header class="app-header dark:bg-background-dark/90 transition-colors duration-300">
        <div class="header-left"><button id="back-btn" class="btn-back">Volver</button></div>
        <div class="user-info flex items-center gap-4">
            <span id="user-display-name" class="font-bold"></span>
            <button id="logout-btn" class="logout-btn">Cerrar sesión</button>
        </div>
    </header>
    <main class="main-content">
        <div class="form-card dark:bg-surface-dark dark:border-white/5 shadow-2xl">
            <h1 class="dark:text-blue-400">Reportar Problema en Caja</h1>
            <p class="dark:text-slate-400">Describe el defecto o problema visual encontrado en la caja.</p>
            
            <div class="grid grid-cols-1 md:grid-cols-[150px_70px_1fr] gap-4 mb-5">
                <div>
                    <label class="dark:text-slate-300">Número de Serie</label>
                    <input type="text" id="cajaSerialInput" placeholder="AA1234" maxlength="6" class="uppercase">
                </div>
                <div>
                    <label class="dark:text-slate-300">N°</label>
                    <input type="text" id="cajaNumeroInput" placeholder="00" maxlength="2" class="text-center">
                </div>
                <div>
                    <label class="dark:text-slate-300">Modelo de la Caja</label>
                    <input type="text" id="cajaModeloInput" placeholder="Ej: Modelo A">
                </div>
            </div>
            
            <div class="form-group">
                <label class="dark:text-slate-300">Tipo de Problema</label>
                <div id="problemaCheckboxGroup" class="selection-group dark:bg-background-dark/50 dark:border-slate-800">
                    <!-- Las clases dinámicas del dark-theme.css se encargarán del resto -->
                    <div class="selection-option">
                        <input type="checkbox" id="problema_manija" name="problema" value="Manija rota">
                        <label for="problema_manija">Manija rota</label>
                    </div>
                    <div class="selection-option">
                        <input type="checkbox" id="problema_cerradura" name="problema" value="Cerradura dañada">
                        <label for="problema_cerradura">Cerradura dañada</label>
                    </div>
                    <div class="selection-option">
                        <input type="checkbox" id="problema_bisagras" name="problema" value="Bisagras sueltas">
                        <label for="problema_bisagras">Bisagras sueltas</label>
                    </div>
                    <div class="selection-option">
                        <input type="checkbox" id="problema_sellado" name="problema" value="Problema de sellado">
                        <label for="problema_sellado">Problema de sellado</label>
                    </div>
                    <div class="selection-option">
                        <input type="checkbox" id="problema_dano" name="problema" value="Daño estructural">
                        <label for="problema_dano">Daño estructural</label>
                    </div>
                    <div class="selection-option">
                        <input type="checkbox" id="problema_otro" name="problema" value="Otro">
                        <label for="problema_otro">Otro (especificar)</label>
                    </div>
                </div>
            </div>

            <div class="form-group" id="otroProblemaContainer" style="display: none;">
                <label class="dark:text-slate-300">Descripción del Problema (Otro):</label>
                <textarea id="otroProblemaTextarea" placeholder="Describe el problema detalladamente..." class="w-full mt-1"></textarea>
            </div>

            <button id="enviarReporteBtn" class="btn-save hover:scale-[1.01] active:scale-95 transition-transform shadow-lg shadow-emerald-500/20">Enviar Reporte</button>
            <div id="message" class="mt-5 font-bold text-center"></div>
        </div>
    </main>
    <script type="module" src="js/reportar-problema.js"></script>   
    <script type="module">import { initGlobalSidebar } from '../js/global-sidebar.js'; initGlobalSidebar();</script>
</body>
</html>
