<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Menú Supervisor - Villalba Systems</title>
    <link rel="icon" href="assets/logo.png" type="image/png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet" />

    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
        rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'villalba-blue': '#2563eb',
                        'background-dark': '#0a0f16',
                        'surface-dark': '#161e2a',
                    },
                    fontFamily: { sans: ['"Public Sans"', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;

            /* Fondo Modo Claro */

            /* Texto Modo Claro */
            opacity: 0;
            animation: fadeInMenu 0.4s ease forwards;
            animation-delay: 0.15s;
        }




        @keyframes fadeInMenu {
            to {
                opacity: 1;
            }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
        }

        html.dark .glass-card {
            background: rgba(22, 30, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: none;
        }

        /* Ocultar elementos por defecto hasta que JS los valide */
        .auth-hidden {
            display: none !important;
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-[#6e8efb] to-[#a777e3] dark:from-[#0a0f16] dark:to-[#0a0f16] text-slate-900 dark:text-[#f1f5f9] antialiased font-sans">

            </header>

            <div class="px-4 lg:px-8 py-8 lg:py-12 flex-1 w-full flex flex-col">

                    <div
                        class="bg-white dark:bg-transparent dark:border dark:border-white/5 shadow-sm dark:shadow-none rounded-[2rem] p-6 lg:p-10 w-full mb-10">

                                        <span

                                        <div>

                                        </div>
                                    </button>

                                    <button id="btn-ver-problemas"
                                        class="auth-hidden view-card group flex items-center p-4 rounded-2xl glass-card hover:bg-slate-100 dark:hover:bg-slate-800 transition-all text-left border-rose-500/20">
                                        <span
                                            class="material-symbols-outlined text-3xl text-orange-400 mr-4 group-hover:scale-110 transition-transform">bug_report</span>
                                        <div>
                                            <h3
                                                class="text-sm font-bold text-slate-900 dark:text-white uppercase tracking-wider text-rose-100">
                                                Ver

                                    </button>
                                </div>
                            </div>

                            <!-- Administración Global -->
                            <div>
                                <h2
                                    class="text-xs font-black tracking-[0.2em] text-villalba-blue uppercase mb-4 border-b border-slate-200 dark:border-white/10 pb-2">
                                    Administración Global</h2>
                                <div class="flex flex-col gap-3">
                                    <button id="btn-catalogo-items"
                                        class="auth-hidden view-card group flex items-center p-4 rounded-2xl glass-card hover:bg-slate-100 dark:hover:bg-slate-800 transition-all text-left">
                                        <span
                                            class="material-symbols-outlined text-3xl text-fuchsia-400 mr-4 group-hover:scale-110 transition-transform">category</span>
                                        <div>
                                            <h3
                                                class="text-sm font-bold text-slate-900 dark:text-white uppercase tracking-wider">

                                    </button>

                                    <button id="btn-historial"
                                        class="auth-hidden view-card group flex items-center p-4 rounded-2xl glass-card hover:bg-slate-100 dark:hover:bg-slate-800 transition-all text-left">
                                        <span
                                            class="material-symbols-outlined text-3xl text-slate-500 dark:text-slate-400 mr-4 group-hover:scale-110 transition-transform">history</span>
                                        <div>
                                            <h3
                                                class="text-sm font-bold text-slate-900 dark:text-white uppercase tracking-wider">
                                                Historial</h3>
                                        </div>
                                    </button>

                                    <button id="btn-informe-diario"
                                        class="auth-hidden view-card group flex items-center p-4 rounded-2xl glass-card hover:bg-slate-100 dark:hover:bg-slate-800 transition-all text-left">
                                        <span
                                            class="material-symbols-outlined text-3xl text-cyan-400 mr-4 group-hover:scale-110 transition-transform">today</span>
                                        <div>
                                            <h3
                                                class="text-sm font-bold text-slate-900 dark:text-white uppercase tracking-wider">
                                                Informe Diario
                                            </h3>
                                        </div>
                                    </button>

                                    <button id="btn-estadisticas"

                                            class="material-symbols-outlined text-3xl text-teal-400 mr-4 group-hover:scale-110 transition-transform">monitoring</span>
                                        <div>
                                            <h3
                                                class="text-sm font-bold text-slate-900 dark:text-white uppercase tracking-wider">
                                                Métricas y
                                                Estadísticas</h3>
                                        </div>
                                    </button>

                                    <button id="btn-registrar-usuario"
                                        class="auth-hidden view-card group flex items-center p-4 rounded-2xl glass-card hover:bg-slate-100 dark:hover:bg-slate-800 transition-all text-left">
                                        <span

                                        <div>

        </main>

    <script type="module">
        import { auth, db, onAuthStateChanged, signOut, doc, getDoc, collection, query, where, onSnapshot } from './js/firebase-config.js';
        import { setupTicketNotifications } from './js/global-notifications.js';
        import { requestNotificationPermission } from './js/fcm-setup.js';

        // Elementos UI
        let currentUserRole = 'supervisor';
        let swRegistration = null;

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('firebase-messaging-sw.js')
                    .then(registration => { swRegistration = registration; })
                    .catch(error => console.error('SW Error:', error));
            });
        }

        // App switcher is now handled by global-sidebar.js

        // Mostrar botoneras dinámicamente según rol
        const manageMenuVisibility = (role, user) => {
            const isSupervisor = role === 'supervisor';
            const isMantenimiento = role === 'mantenimiento';

            const unhide = (id) => { const el = document.getElementById(id); if (el) el.classList.remove('auth-hidden'); }

            // Básicos (todos los logueados)
            unhide('btn-cuenta');
            unhide('btn-tickets');
            if (!isMantenimiento) unhide('btn-cajas');
            unhide('btn-reportar-problema');
            unhide('btn-notifications');

            // Manto o Super
            if (isSupervisor || isMantenimiento) {
                unhide('btn-ver-problemas');
            }

            // Super solo
            if (isSupervisor) {
                const superIds = [
                    'btn-catalogo-items', 'btn-historial', 'btn-informe-diario', 'btn-importar-datos',
                    'btn-registrar-usuario', 'btn-gestion-usuarios', 'btn-estadisticas',
                    'btn-estados-cajas', 'btn-buscar-prestamo', 'btn-buscar-reporte'
                ];
                superIds.forEach(id => unhide(id));
            }
            const uidUsuarioEspecial = "k2PzZ3iXA4YNrhBADWj2DC6Or202";
            if (user && user.uid === uidUsuarioEspecial) {
                unhide('btn-informe-diario');
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const userDocRef = doc(db, "users", user.uid);
                    const userDocSnap = await getDoc(userDocRef);
                    if (userDocSnap.exists()) {
                        const userData = userDocSnap.data();
                        currentUserRole = userData.role || 'supervisor';
                        const headerName = document.getElementById('header-user-name');
                        if (headerName) headerName.textContent = userData.name || user.email;
                    } else {
                        currentUserRole = 'supervisor';
                        const headerName = document.getElementById('header-user-name');
                        if (headerName) headerName.textContent = user.email;
                    }
                    manageMenuVisibility(currentUserRole, user);
                    setupTicketNotifications(db, collection, query, where, onSnapshot, user, currentUserRole);
                } catch (error) {
                    console.error("Error al obtener datos:", error);
                    manageMenuVisibility('supervisor', null);
                }
            } else {
                window.location.href = '../login.html';
            }
        });

        const setupRoute = (id, path) => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('click', () => window.location.href = path);
        }

        setupRoute('btn-cajas', 'modelos-de-cajas.html');
        setupRoute('btn-historial', 'lista-historial.html');
        setupRoute('btn-informe-diario', 'informe-diario.html');
        setupRoute('btn-cuenta', 'cuenta.html');
        setupRoute('btn-importar-datos', 'redir-import.html');
        setupRoute('btn-registrar-usuario', 'register.html');
        setupRoute('btn-gestion-usuarios', 'gestion-usuarios.html');
        setupRoute('btn-estadisticas', 'estadisticas.html');
        setupRoute('btn-estados-cajas', 'estados-cajas.html');
        setupRoute('btn-reportar-problema', 'reportar-problema.html');
        setupRoute('btn-ver-problemas', 'ver-problemas.html');
        setupRoute('btn-buscar-prestamo', 'buscar-por-prestamo.html');
        setupRoute('btn-buscar-reporte', 'buscar-reporte.html');
        setupRoute('btn-catalogo-items', 'catalogo-items.html');

        document.getElementById('btn-tickets')?.addEventListener('click', () => {
            window.location.href = currentUserRole === 'supervisor' ? 'tickets-supervisor.html' : 'tickets-operador.html';
        });

        document.getElementById('btn-notifications')?.addEventListener('click', () => {
            if (swRegistration) requestNotificationPermission(swRegistration);
            else alert('El servicio no está listo. Recarga la página.');
        });
    </script>

    <script type="module">import '../js/theme.js';</script>
</body>

</html>
