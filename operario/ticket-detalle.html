<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Ticket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="../css/dark-theme.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { 'villalba-blue': '#2E5BFF', 'villalba-dark': '#0B0F19' }
                }
            }
        }
    </script>
    <style>
        body { opacity: 0; animation: fadeInBody 0.4s ease forwards 0.1s; }
        @keyframes fadeInBody { to { opacity: 1; } }
    </style>
</head>
<body class="bg-gradient-to-br from-[#6e8efb] to-[#a777e3] dark:from-[#0B0F19] dark:to-[#0B0F19] text-slate-800 dark:text-slate-200 min-h-screen font-sans selection:bg-villalba-blue/30 selection:text-villalba-blue m-0 flex flex-col pt-24 pb-8 transition-colors duration-300">

    <header class="fixed top-0 z-50 bg-white/80 dark:bg-[#0B0F19]/80 backdrop-blur-xl border-b border-slate-200 dark:border-white/10 h-20 w-full flex items-center justify-between px-4 lg:px-8 transition-all">
        <div class="header-left flex items-center gap-4 lg:gap-6 w-full">
            <button id="volver-btn" class="w-10 h-10 shrink-0 rounded-xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300 hover:bg-villalba-blue hover:text-white dark:hover:bg-villalba-blue transition-colors shadow-sm">
                <span class="material-symbols-outlined text-[20px]">arrow_back</span>
            </button>
            <h1 id="ticket-asunto" class="text-lg lg:text-2xl font-black text-villalba-blue dark:text-white tracking-tight uppercase truncate">Cargando...</h1>
            <span id="ticket-estado-badge" class="hidden px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest shrink-0 ml-auto md:ml-0"></span>
        </div>
    </header>

    <main class="px-4 lg:px-8 max-w-[1000px] w-full mx-auto animate-in fade-in slide-in-from-bottom-4 duration-500 min-h-[calc(100vh-120px)] flex flex-col">

        <div id="mensajes-container" class="flex-grow bg-white dark:bg-slate-800/40 rounded-[2rem] p-6 lg:p-8 border border-slate-200 dark:border-white/5 shadow-sm overflow-y-auto flex flex-col mb-6 h-[500px]">
            <!-- JS Injection -->
        </div>

        <div id="respuesta-container" class="flex items-end gap-2 lg:gap-4 bg-white dark:bg-slate-800/80 p-3 lg:p-4 rounded-[2rem] border border-slate-200 dark:border-white/10 shadow-lg">
            <textarea id="mensaje-respuesta" class="flex-grow bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-white/10 text-slate-800 dark:text-white text-sm font-medium rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-villalba-blue/50 focus:border-villalba-blue transition-all min-h-[60px] resize-none placeholder:font-normal placeholder:text-slate-400 max-h-[200px]" placeholder="Escribe tu respuesta..."></textarea>
            
            <button id="enviar-respuesta-btn" class="h-[60px] lg:px-8 px-5 rounded-2xl bg-villalba-blue text-white font-black text-xs uppercase tracking-widest hover:bg-blue-700 transition-all shadow-lg shadow-blue-500/20 hover:-translate-y-1 flex items-center justify-center gap-2 shrink-0">
                <span class="material-symbols-outlined text-[20px] lg:hidden">send</span>
                <span class="hidden lg:inline">Enviar</span>
            </button>
        </div>

        <div class="flex flex-col md:flex-row gap-4 mt-6">
            <button id="cerrar-ticket-btn" class="hidden flex-1 py-4 rounded-2xl bg-amber-50 dark:bg-amber-500/10 text-amber-600 dark:text-amber-500 font-black uppercase text-xs tracking-widest hover:bg-amber-500 hover:text-white dark:hover:bg-amber-500 transition-colors border border-amber-100 dark:border-amber-500/20 shadow-sm text-center">Cerrar Ticket</button>
            <button id="eliminar-ticket-btn" class="hidden flex-1 py-4 rounded-2xl bg-rose-50 dark:bg-rose-500/10 text-rose-600 dark:text-rose-500 font-black uppercase text-xs tracking-widest hover:bg-rose-500 hover:text-white dark:hover:bg-rose-500 transition-colors border border-rose-100 dark:border-rose-500/20 shadow-sm text-center">Eliminar Permanentemente</button>
        </div>

    </main>

    <div id="sidebar-container"></div>
    <script type="module" src="js/ticket-detalle.js"></script>
    <script type="module">
        import { initGlobalSidebar } from '../js/global-sidebar.js'; 
        initGlobalSidebar();
    </script>
    <script type="module">import "../js/theme.js";</script>
</body>
</html>
