    <script>
        tailwind.config = {

    <style>
        body {
            margin: 0;
            min-height: 100vh;

            /* Fondo Modo Claro */

            /* Texto Modo Claro */
            opacity: 0;
            animation: fadeInMenu 0.4s ease forwards;
            animation-delay: 0.15s;
        }




        @keyframes fadeInMenu {
            to {
                opacity: 1;
            }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);

        html.dark .glass-card {
            background: rgba(22, 30, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: none;
        }

        /* Ocultar elementos por defecto hasta que JS los valide */
        .auth-hidden {
            display: none !important;
        }
    </style>
</head>

    <script type="module">
        import { auth, db, onAuthStateChanged, signOut, doc, getDoc, collection, query, where, onSnapshot } from './js/firebase-config.js';
        import { setupTicketNotifications } from './js/global-notifications.js';
        import { requestNotificationPermission } from './js/fcm-setup.js';

        // Elementos UI
        const btnNotificationsText = document.getElementById('btn-notifications-text');

        let currentUserRole = 'mantenimiento';
        let swRegistration = null;

        // Register Service Worker is here...

        // App switcher is now handled by global-sidebar.js

        // Mostrar botoneras dinámicamente según rol
        const manageMenuVisibility = (role) => {
            const isMantenimiento = role === 'mantenimiento';

            const unhide = (id) => { const el = document.getElementById(id); if (el) el.classList.remove('auth-hidden'); }

            if (isMantenimiento) {
                unhide('btn-cuenta');
                unhide('btn-tickets');
                unhide('btn-reportar-problema');
                unhide('btn-ver-problemas');
                unhide('btn-notifications');
            }
        };

        const updateNotificationButtonUI = () => {
            if (!('Notification' in window)) return;
            const btn = document.getElementById('btn-notifications');
            if (!btn) return;

            // Simple visual update for Tailwind Dark Mode
            if (Notification.permission === 'default') {
                btn.classList.add('border', 'border-yellow-500/50', 'bg-yellow-500/10');
                btnNotificationsText.textContent = '🔔 Alertas: Requerido';
            } else if (Notification.permission === 'granted') {
                btn.classList.add('border', 'border-emerald-500/30', 'bg-emerald-500/10');
                btnNotificationsText.textContent = '✅ Alertas Activas';
                btnNotificationsText.classList.replace('text-slate-900 dark:text-white', 'text-emerald-300');
            } else if (Notification.permission === 'denied') {
                btn.classList.add('border', 'border-rose-500/30', 'bg-rose-500/10');
                btnNotificationsText.textContent = '❌ Alertas Bloqueadas';
                btnNotificationsText.classList.replace('text-slate-900 dark:text-white', 'text-rose-300');
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const userDocRef = doc(db, "users", user.uid);
                    const userDocSnap = await getDoc(userDocRef);
                    if (userDocSnap.exists()) {
                        const userData = userDocSnap.data();
                        currentUserRole = userData.role || 'mantenimiento';
                        const headerName = document.getElementById('header-user-name');
                        if (headerName) headerName.textContent = userData.name || user.email;
                    } else {
                        currentUserRole = 'mantenimiento';
                        const headerName = document.getElementById('header-user-name');
                        if (headerName) headerName.textContent = user.email;
                    }
                    manageMenuVisibility(currentUserRole);
                    updateNotificationButtonUI();
                    setupTicketNotifications(db, collection, query, where, onSnapshot, user, currentUserRole);

                    // Auto-prompt Notifications
                    const urlParams = new URLSearchParams(window.location.search);
                    if (urlParams.get('prompt_notifications') === 'true') {
                        if ('serviceWorker' in navigator) {
                            navigator.serviceWorker.ready.then(registration => {
                                requestNotificationPermission(registration);
                                const newUrl = window.location.pathname;
                                window.history.replaceState({}, document.title, newUrl);
                            });
                        }
                    }
                } catch (error) {
                    console.error("Error al obtener datos:", error);
                    manageMenuVisibility('mantenimiento');
                }
            } else {
                window.location.href = '../login.html';
            }
        });

        // Event Listeners (Routing)
        const setupRoute = (id, path) => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('click', () => window.location.href = path);
        }

        // Rutas Mantenimiento
        setupRoute('btn-cajas', 'modelos-de-cajas.html');
        setupRoute('btn-cuenta', 'cuenta.html');
        setupRoute('btn-reportar-problema', 'reportar-problema.html');
        setupRoute('btn-ver-problemas', 'ver-problemas.html');

        document.getElementById('btn-tickets')?.addEventListener('click', () => {
            window.location.href = currentUserRole === 'supervisor' ? 'tickets-supervisor.html' : 'tickets-operador.html';
        });

        document.getElementById('btn-notifications')?.addEventListener('click', async () => {
            if ('serviceWorker' in navigator) {
                const registration = await navigator.serviceWorker.ready;
                try {
                    await requestNotificationPermission(registration);
                    alert('✅ Permisos de notificaciones habilitados.');
                } catch (error) {
                    console.error(error);
                    alert('❌ Error al obtener el token.');
                }
                updateNotificationButtonUI();
            }
        });
    </script>
