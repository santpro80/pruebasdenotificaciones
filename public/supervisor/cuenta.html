<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cuenta | Sistema de Trazabilidad</title>
    <link rel="icon" href="assets/logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { "villalba-blue": "#2563eb" },
                    fontFamily: { sans: ["\"Public Sans\"", "sans-serif"] }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            opacity: 0;
            animation: fadeInMenu 0.4s ease forwards;
            animation-delay: 0.15s;
        }

        @keyframes fadeInMenu { to { opacity: 1; } }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        html.dark .glass-card {
            background: rgba(22, 30, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: none;
        }
    </style>
    <link rel="stylesheet" href="../css/dark-theme.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body class="bg-gradient-to-br from-[#6e8efb] to-[#a777e3] dark:from-[#0a0f16] dark:to-[#0a0f16] text-slate-900 dark:text-[#f1f5f9] antialiased">
    <header class="bg-[#f8fafc] dark:bg-transparent backdrop-blur-md shadow-sm dark:shadow-none border-b border-white/20 dark:border-white/10 px-4 lg:px-8 py-3 flex items-center justify-between gap-4 sticky top-0 z-40 w-full hover:bg-white/95 transition-colors">
        <div class="header-left flex items-center gap-4">
            <button id="back-btn" class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-villalba-blue/10 text-villalba-blue hover:bg-villalba-blue hover:text-white transition-all border border-villalba-blue/20 group">
                <span class="material-symbols-outlined text-[20px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
                <span class="text-xs font-bold uppercase tracking-wide">Menú</span>
            </button>
        </div>
        <div class="user-info flex items-center gap-4">
            <span id="user-display-name" class="hidden md:inline-block text-sm font-bold text-slate-700 dark:text-slate-300">Cargando...</span>
            <button id="logout-btn" class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-rose-500/10 text-rose-500 hover:bg-rose-500 hover:text-white transition-all border border-rose-500/20">
                <span class="material-symbols-outlined text-[18px]">logout</span>
                <span class="text-xs font-bold uppercase tracking-wide hidden sm:inline-block">Salir</span>
            </button>
        </div>
    </header>

    <main class="px-4 lg:px-8 py-8 lg:py-12 flex justify-center">
        <div class="glass-card rounded-[2.5rem] p-8 lg:p-12 w-full max-w-lg">
            <div class="flex justify-center mb-6">
                <img src="assets/logo.png" alt="Logo Villalba" class="w-24 h-auto">
            </div>

            <div class="text-center mb-10">
                <h1 class="text-3xl font-black text-villalba-blue dark:text-white tracking-tight mb-2 uppercase">Mi Cuenta</h1>
                <p class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-400 dark:text-slate-500">Información de Perfil</p>
            </div>
            
            <div class="space-y-3 mb-10 text-left">
                <div class="flex items-center justify-between p-5 rounded-2xl bg-white/50 dark:bg-slate-800/40 border border-slate-200 dark:border-white/5 shadow-sm">
                    <span class="text-[10px] font-black uppercase tracking-widest text-slate-400">Nombre</span>
                    <span id="user-name" class="text-sm font-black text-slate-900 dark:text-white tracking-tight uppercase">Cargando...</span>
                </div>
                <div class="flex items-center justify-between p-5 rounded-2xl bg-white/50 dark:bg-slate-800/40 border border-slate-200 dark:border-white/5 shadow-sm">
                    <span class="text-[10px] font-black uppercase tracking-widest text-slate-400">Rol</span>
                    <span id="user-role" class="text-sm font-black text-slate-900 dark:text-white tracking-tight uppercase">Cargando...</span>
                </div>
            </div>
            
            <div class="text-center mb-6 border-t border-slate-200/50 dark:border-white/5 pt-10">
                <h2 class="text-[11px] font-black uppercase tracking-[0.3em] text-slate-400 dark:text-slate-500 mb-8">Gestión de Seguridad</h2>
                <form id="changePasswordForm" class="space-y-4">
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-[20px]">lock</span>
                        <input type="password" id="current-password" placeholder="Contraseńa actual" class="w-full pl-12 pr-5 py-4 rounded-2xl bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-white/5 focus:border-villalba-blue outline-none transition-all text-sm font-bold tracking-tight" required>
                    </div>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-[20px]">key</span>
                        <input type="password" id="new-password" placeholder="Nueva contraseńa (min. 6)" class="w-full pl-12 pr-5 py-4 rounded-2xl bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-white/5 focus:border-villalba-blue outline-none transition-all text-sm font-bold tracking-tight" required minlength="6">
                    </div>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-[20px]">verified_user</span>
                        <input type="password" id="confirm-new-password" placeholder="Confirmar contraseńa" class="w-full pl-12 pr-5 py-4 rounded-2xl bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-white/5 focus:border-villalba-blue outline-none transition-all text-sm font-bold tracking-tight" required minlength="6">
                    </div>
                    <button type="submit" id="change-password-btn" class="w-full py-4 mt-6 rounded-2xl bg-villalba-blue text-white font-black uppercase tracking-[0.2em] text-[11px] shadow-xl shadow-villalba-blue/30 hover:shadow-villalba-blue/40 hover:-translate-y-1 active:translate-y-0 transition-all">Actualizar Acceso</button>
                </form>
            </div>
            <div id="message-area" class="mt-6 text-[10px] font-black uppercase tracking-widest text-center animate-pulse"></div>
        </div>
    </main>

    <script type="module" src="js/cuenta.js"></script>
    <script type="module">import "../js/theme.js";</script>
</body>
</html>
