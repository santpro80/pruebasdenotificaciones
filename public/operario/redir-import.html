<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecci�n de Importaci�n | Sistema de Trazabilidad</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            font-family: 'Inter', Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #6e8efb, #a777e3); 
            color: #2c3e50;
            text-align: center;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .app-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e0e0e0;
            z-index: 1000;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-back {
            background: none;
            border: none;
            color: #34495e;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px;
            border-radius: 8px;
            transition: background-color 0.2s ease;
        }

        .btn-back:hover {
            background-color: rgba(0, 0, 0, 0.05);
        }

        .btn-back svg {
            width: 18px;
            height: 18px;
            stroke-width: 2;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-email, .user-display-name {
            font-weight: 500;
            color: #34495e;
            font-size: 0.9em;
        }

        .logout-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            font-size: 0.8em;
            display: flex; 
            align-items: center; 
            gap: 5px; 
        }

        .logout-btn:hover {
            background-color: #c0392b;
        }
        
        .main-content {
            flex: 1;
            padding: 80px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        
        .card-container {
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 600px;
            animation: fadeIn 0.5s ease-out;
            text-align: left;
        }

        .card-container h1 {
            color: #2c3e50;
            text-align: center;
        }
        .button-container {
            display: flex;
            flex-direction: column; 
            gap: 15px; 
            margin-top: 30px;
            width: 100%;
            align-items: center;
        }
        .btn-import {
            width: 80%;
            max-width: 300px;
            padding: 15px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-decoration: none; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-import:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .btn-import-schema {
            background-color: #3498db; 
        }

        .btn-import-schema:hover {
            background-color: #2980b9;
        }

        .btn-import-items {
            background-color: #2ecc71; 
        }

        .btn-import-items:hover {
            background-color: #27ae60;
        }
        @media (max-width: 768px) {
            .app-header {
                padding: 5px 15px;
                flex-direction: column;
                gap: 10px;
            }
        
            .user-info {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 5px;
            }
        
            .logout-btn {
                font-size: 0.8em;
                padding: 5px;
            }
        
            .main-content {
                padding: 60px 10px 10px;
            }
        
            .card-container {
                padding: 20px;
            }
        }
    
        body {
            opacity: 0;
            animation: fadeInMenu 0.4s ease forwards;
            animation-delay: 0.15s;
        }

        @keyframes fadeInMenu {
            to { opacity: 1; }
        }
    
</style>

    
    <link rel="stylesheet" href="../css/dark-theme.css">
</head>
<body>
    <header class="app-header">
        <div class="header-left">
            <button id="back-btn" class="btn-back">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M19 12H5"></path>
                    <path d="M12 19l-7-7 7-7"></path>
                </svg>
                Volver
            </button>
        </div>
        <div class="user-info">
            <span class="user-display-name" id="user-display-name"></span>
            <button id="logout-btn" class="logout-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Cerrar sesi�n
            </button>
        </div>
    </header>
    <main class="main-content">
        <div class="card-container">
            <h1>Redirecci�n de Importaci�n</h1>
            <p style="text-align: center; margin-top: 20px;">
                Selecciona el tipo de importaci�n que deseas realizar.
            </p>
            <div class="button-container">
                <button id="import-schema-btn" class="btn-import btn-import-schema">Importar Esquema</button>
                <button id="import-items-btn" class="btn-import btn-import-items">Importar �tems</button>
            </div>
        </div>
    </main>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module">
        import { auth } from './js/firebase-config.js';
        import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        onAuthStateChanged(auth, user => {
            if (!user) {
                window.location.href = 'login.html';
            }
        });
        document.getElementById('back-btn')?.addEventListener('click', () => {
            window.location.href = 'menu.html';
        });
        document.getElementById('import-schema-btn')?.addEventListener('click', () => {
            window.location.href = 'importar-esquema.html';
        });
        document.getElementById('import-items-btn')?.addEventListener('click', () => {
            window.location.href = 'importar-datos.html';
        });
        document.getElementById('logout-btn')?.addEventListener('click', async () => {
            try {
                await signOut(auth);
                window.location.href = 'login.html';
            } catch (error) {
                console.error('Error al cerrar sesi�n:', error);
            }
        });
    </script>

    <script type="module">import { initGlobalSidebar } from '../js/global-sidebar.js'; initGlobalSidebar();</script>
</body>
</html>
