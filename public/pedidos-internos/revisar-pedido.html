<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0f16" />
    <title>Revisar Pedido - Pedidos Internos</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { 'villalba-blue': '#2563eb', 'background-dark': '#0a0f16', 'surface-dark': '#161e2a' }, fontFamily: { sans: ['"Public Sans"', 'sans-serif'] } } }
        }
    </script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-width: 320px;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            opacity: 0;
            animation: fadeInMenu 0.4s ease forwards;
            animation-delay: 0.15s;
        }

        @keyframes fadeInMenu {
            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body
    class="bg-[#f8fafc] dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased font-sans transition-colors duration-300">
    <div id="app-container" class="flex h-screen overflow-hidden">
        <div id="side-drawer-overlay"
            class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden transition-opacity"
            onclick="document.getElementById('side-drawer').classList.add('-translate-x-full'); this.classList.add('hidden')">
        </div>
        <aside id="side-drawer"
            class="fixed inset-y-0 left-0 z-[100] w-72 transform -translate-x-full transition-transform duration-300 ease-in-out">
        </aside>

        <main class="flex-1 overflow-y-auto relative" id="main-content">
            <div id="loading-state"
                class="h-full w-full flex flex-col items-center justify-center text-slate-400 gap-4 mt-20">
                <span class="material-symbols-outlined text-4xl animate-spin text-villalba-blue">sync</span>
            </div>

            <div id="new-order-content" class="hidden">
                <div class="flex flex-col min-h-screen bg-[#f8fafc] dark:bg-background-dark">
                    <header
                        class="flex items-center bg-white/80 dark:bg-background-dark/80 backdrop-blur-md px-6 py-4 sticky top-0 z-50 border-b border-slate-200 dark:border-slate-800">
                        <div class="flex items-center gap-3 flex-1">
                            <button
                                onclick="document.getElementById('side-drawer').classList.remove('-translate-x-full'); document.getElementById('side-drawer-overlay') && document.getElementById('side-drawer-overlay').classList.remove('hidden');"
                                class="size-10 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors ">
                                <span class="material-symbols-outlined text-slate-600 dark:text-slate-400">menu</span>
                            </button>
                            <button onclick="window.history.back()"
                                class="size-10 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 transition-colors ml-[-4px]">
                                <span class="material-symbols-outlined">arrow_back</span>
                            </button>
                            <div class="flex flex-col ml-2">
                                <span
                                    class="text-lg font-black tracking-tighter uppercase text-slate-900 dark:text-white leading-none">NUEVO
                                    PEDIDO</span>
                                <span
                                    class="text-[10px] font-medium tracking-[0.2em] uppercase text-villalba-blue mt-1 leading-none">Carga
                                    de Datos</span>
                            </div>
                        </div>
                    </header>

                    <div class="flex-1 w-full max-w-[480px] mx-auto px-6 py-8">
                        <form id="new-order-form" class="space-y-5">
                            <!-- Solicitante -->
                            <div class="flex flex-col gap-1.5">
                                <label
                                    class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 dark:text-slate-400 ml-1">Solicitante</label>
                                <div class="relative">
                                    <span
                                        class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
                                    <input
                                        class="w-full pl-12 pr-4 h-14 bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-sm font-bold text-slate-500 dark:text-slate-400 cursor-not-allowed uppercase"
                                        id="no-entity" readonly type="text" value="Cargando..." />
                                </div>
                            </div>

                            <!-- Producto / Insumo -->
                            <div class="flex flex-col gap-1.5">
                                <label
                                    class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 dark:text-slate-400 ml-1">Producto
                                    / Insumo</label>
                                <div class="relative group">
                                    <span
                                        class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-villalba-blue transition-colors text-xl">inventory_2</span>
                                    <input
                                        class="w-full pl-12 pr-4 h-14 bg-white dark:bg-surface-dark border border-slate-200 dark:border-slate-800 rounded-xl text-sm font-bold text-slate-900 dark:text-white focus:ring-2 focus:ring-villalba-blue/40 focus:border-villalba-blue outline-none transition-all"
                                        id="no-item" placeholder="Nombre del material" required type="text" />
                                </div>
                            </div>

                            <!-- Proveedor recomendado -->
                            <div class="flex flex-col gap-1.5">
                                <label
                                    class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 dark:text-slate-400 ml-1">Proveedor
                                    Recomendado</label>
                                <div class="relative group">
                                    <span
                                        class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-villalba-blue transition-colors text-xl">storefront</span>
                                    <input
                                        class="w-full pl-12 pr-4 h-14 bg-white dark:bg-surface-dark border border-slate-200 dark:border-slate-800 rounded-xl text-sm font-bold text-slate-900 dark:text-white focus:ring-2 focus:ring-villalba-blue/40 focus:border-villalba-blue outline-none transition-all"
                                        id="no-supplier" placeholder="Nombre del proveedor" type="text" />
                                </div>
                            </div>

                            <!-- Cantidad + Unidad -->
                            <div class="grid grid-cols-2 gap-4">
                                <div class="flex flex-col gap-1.5">
                                    <label
                                        class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 dark:text-slate-400 ml-1">Cantidad</label>
                                    <div class="relative group">
                                        <span
                                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-villalba-blue transition-colors text-xl">tag</span>
                                        <input
                                            class="w-full pl-10 pr-4 h-14 bg-white dark:bg-surface-dark border border-slate-200 dark:border-slate-800 rounded-xl text-base font-bold text-slate-900 dark:text-white focus:ring-2 focus:ring-villalba-blue/40 outline-none"
                                            id="no-quantity" placeholder="0" required type="number" min="0.01"
                                            step="any" />
                                    </div>
                                </div>
                                <div class="flex flex-col gap-1.5">
                                    <label
                                        class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 dark:text-slate-400 ml-1">Unidad</label>
                                    <div class="relative">
                                        <span
                                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl pointer-events-none">straighten</span>
                                        <select
                                            class="w-full pl-10 pr-4 h-14 bg-white dark:bg-surface-dark border border-slate-200 dark:border-slate-800 rounded-xl text-base font-bold text-slate-900 dark:text-white focus:ring-2 focus:ring-villalba-blue/40 outline-none appearance-none"
                                            id="no-unit">
                                            <option value="UDS">Unidades (UDS)</option>
                                            <option value="MTS">Metros (MTS)</option>
                                            <option value="KG">Kilogramos (KG)</option>
                                            <option value="LTS">Litros (LTS)</option>
                                            <option value="BLT">Bultos (BLT)</option>
                                            <option value="PQTE">Paquetes (PQTE)</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <!-- Prioridad -->
                            <div class="flex flex-col gap-1.5">
                                <label
                                    class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 dark:text-slate-400 ml-1">Prioridad</label>
                                <div class="relative">
                                    <span
                                        class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl pointer-events-none">flag</span>
                                    <select
                                        class="w-full pl-12 pr-4 h-14 bg-white dark:bg-surface-dark border border-slate-200 dark:border-slate-800 rounded-xl text-base font-bold text-slate-900 dark:text-white focus:ring-2 focus:ring-villalba-blue/40 outline-none appearance-none"
                                        id="no-priority" disabled>
                                        <option>Baja</option>
                                        <option>Media</option>
                                        <option>Alta</option>
                                    </select>
                                </div>
                            </div>

                            <!-- DIVISOR ADMIN -->
                            <div class="mt-8 mb-4 border-t border-dashed border-slate-300 dark:border-slate-700 pt-6">
                                <h3
                                    class="text-xs font-black uppercase tracking-widest text-villalba-blue mb-4 flex items-center gap-2">
                                    <span class="material-symbols-outlined text-[18px]">admin_panel_settings</span>
                                    Secci&oacute;n Administrador
                                </h3>
                            </div>

                            <!-- Proveedor Elegido por Admin -->
                            <div class="flex flex-col gap-1.5 mb-4">
                                <label
                                    class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 dark:text-slate-400 ml-1">Proveedor
                                    Final (Admin)</label>
                                <div class="relative group">
                                    <span
                                        class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-villalba-blue transition-colors text-xl">store</span>
                                    <input
                                        class="w-full pl-12 pr-4 h-14 bg-white dark:bg-surface-dark border border-slate-200 dark:border-slate-800 rounded-xl text-sm font-bold text-slate-900 dark:text-white focus:ring-2 focus:ring-villalba-blue/40 focus:border-villalba-blue outline-none transition-all"
                                        id="admin-supplier" placeholder="Nombre del proveedor elegido" type="text" />
                                </div>
                            </div>

                            <!-- Estado + Fecha de entrega -->
                            <div class="grid grid-cols-2 gap-4">
                                <div class="flex flex-col gap-1.5">
                                    <label
                                        class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 dark:text-slate-400 ml-1">Estado</label>
                                    <div class="relative group">
                                        <span
                                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-villalba-blue transition-colors text-xl">rule</span>
                                        <select
                                            class="w-full pl-10 pr-4 h-14 bg-white dark:bg-surface-dark border border-slate-200 dark:border-slate-800 rounded-xl text-sm font-bold text-slate-900 dark:text-white focus:ring-2 focus:ring-villalba-blue/40 outline-none appearance-none transition-colors"
                                            id="admin-status">
                                            <option value="Pendiente" class="text-slate-900">Pendiente</option>
                                            <option value="En revisión" class="text-blue-600">En revisi&oacute;n
                                            </option>
                                            <option value="Aprobado" class="text-emerald-600">Aprobado</option>
                                            <option value="Denegado" class="text-rose-600">Denegado</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="flex flex-col gap-1.5">
                                    <label
                                        class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 dark:text-slate-400 ml-1">Fecha
                                        Prometida</label>
                                    <div class="relative group">
                                        <span
                                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-villalba-blue transition-colors text-xl">calendar_month</span>
                                        <input
                                            class="w-full pl-10 pr-4 h-14 bg-white dark:bg-surface-dark border border-slate-200 dark:border-slate-800 rounded-xl text-sm font-bold text-slate-900 dark:text-white focus:ring-2 focus:ring-villalba-blue/40 outline-none"
                                            id="admin-delivery-date" type="date" />
                                    </div>
                                </div>
                            </div>

                            <!-- Cotización -->
                            <div class="flex flex-col gap-1.5 mt-4">
                                <label
                                    class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 dark:text-slate-400 ml-1">Costo
                                    / Cotizaci&oacute;n</label>
                                <div class="relative group flex items-center">
                                    <span
                                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-villalba-blue transition-colors text-xl pointer-events-none z-10">payments</span>
                                    <input
                                        class="w-full pl-10 pr-24 h-14 bg-white dark:bg-surface-dark border border-slate-200 dark:border-slate-800 rounded-xl text-base font-bold text-slate-900 dark:text-white focus:ring-2 focus:ring-villalba-blue/40 outline-none transition-all"
                                        id="admin-quotation-display" placeholder="0,00" type="text" />
                                    <input type="hidden" id="admin-quotation" value="0">

                                    <!-- Selector de Moneda -->
                                    <div
                                        class="absolute right-2 top-1/2 -translate-y-1/2 flex items-center bg-slate-100 dark:bg-slate-800 rounded-lg p-1 border border-slate-200 dark:border-slate-700">
                                        <select id="admin-currency"
                                            class="bg-transparent text-[10px] font-black uppercase text-slate-600 dark:text-slate-300 outline-none cursor-pointer px-2 h-8">
                                            <option value="ARS">ARS</option>
                                            <option value="USD">USD</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <!-- Motivo de rechazo, oculto por defecto -->
                            <div class="flex flex-col gap-1.5 hidden" id="rejection-container">
                                <label
                                    class="text-[10px] font-black uppercase tracking-[0.2em] text-rose-500 ml-1">Notas /
                                    Motivo</label>
                                <div class="relative group">
                                    <span
                                        class="material-symbols-outlined absolute left-4 top-4 text-rose-400 group-focus-within:text-rose-500 transition-colors text-xl">block</span>
                                    <textarea
                                        class="w-full pl-12 pr-4 py-4 h-24 bg-white dark:bg-surface-dark border border-slate-200 dark:border-slate-800 rounded-xl text-sm font-bold text-slate-900 dark:text-white focus:ring-2 focus:ring-rose-500/40 focus:border-rose-500 outline-none transition-all resize-none"
                                        id="admin-rejection-reason"
                                        placeholder="Explique detalles adicionales..."></textarea>
                                </div>
                            </div>

                            <!-- Actions -->
                            <div class="flex flex-col gap-3 pt-4 pb-20">
                                <button type="submit" id="submit-order-btn"
                                    class="w-full bg-villalba-blue hover:bg-blue-700 text-white h-14 rounded-xl font-black tracking-widest shadow-lg flex items-center justify-center gap-3 transition-all active:scale-[0.98] text-sm uppercase">
                                    <span class="btn-text">GUARDAR CAMBIOS</span>
                                    <span class="material-symbols-outlined text-lg">check_circle</span>
                                </button>
                                <button type="button" onclick="window.history.back()"
                                    class="w-full bg-transparent text-slate-500 h-12 rounded-xl font-bold text-xs uppercase tracking-widest hover:text-slate-700 dark:hover:text-slate-300 transition-colors">
                                    Cancelar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="./js/revisar-pedido.js" type="module"></script>
    <script type="module">import '../js/theme.js';</script>
</body>

</html>
