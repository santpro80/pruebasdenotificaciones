<!DOCTYPE html>
<html lang="es" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f16" />
  <title>Gestión de Pedidos - Pedidos Internos</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <!-- Google Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
    rel="stylesheet" />
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'villalba-blue': '#2563eb',
            'background-dark': '#0a0f16',
            'surface-dark': '#161e2a'
          },
          fontFamily: {
            sans: ['"Public Sans"', 'sans-serif']
          }
        }
      }
    }
  </script>
  <!-- Custom Styles -->
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-width: 320px;
      transition: background-color 0.3s, color 0.3s;
    }

    body {
      opacity: 0;
      animation: fadeInMenu 0.4s ease forwards;
      animation-delay: 0.15s;
    }

    @keyframes fadeInMenu {
      to {
        opacity: 1;
      }
    }

    /* Ocultar scrollbar pero permitir scroll */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>

<body
  class="bg-gradient-to-br from-[#6e8efb] to-[#a777e3] dark:from-[#0a0f16] dark:to-[#0a0f16] text-slate-900 dark:text-[#f1f5f9] antialiased font-sans transition-colors duration-300">
  <div id="app-container" class="flex h-screen overflow-hidden">
    <!-- App container -->

    <main class="flex-1 overflow-y-auto relative p-0" id="main-content">
      <div id="loading-state"
        class="h-full w-full flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 gap-4 mt-20">
        <span class="material-symbols-outlined text-4xl animate-spin text-villalba-blue">sync</span>
      </div>

      <div id="operator-content" class="hidden h-full">
        <div class="flex flex-col min-h-screen bg-transparent">
          <!-- Header -->
          <header
            class="sticky top-0 z-50 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
            <div class="flex items-center justify-between px-6 py-4">
              <div class="flex items-center gap-3">
                <button
                  id="global-hamburger-btn"
                  onclick="toggleGlobalSidebar()"
                  class="size-10 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                  <span class="material-symbols-outlined text-slate-600 dark:text-slate-400">menu</span>
                </button>
                <button onclick="window.location.href='menu.html'"
                  class="size-10 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 transition-colors">
                  <span class="material-symbols-outlined">arrow_back</span>
                </button>
                <div
                  class="size-8 rounded-xl bg-gradient-to-br from-villalba-blue to-blue-800 flex items-center justify-center text-white font-black text-sm shadow-lg shadow-blue-500/30">
                  <span class="material-symbols-outlined text-[16px]">receipt_long</span>
                </div>
                <h1 class="text-xl font-bold tracking-tight uppercase text-slate-900 dark:text-white mt-1">Gestión de
                  Pedidos</h1>
              </div>
              <div class="flex flex-col items-end">
                <span id="my-orders-count"
                  class="text-[10px] font-black text-villalba-blue uppercase tracking-widest bg-blue-500/10 px-3 py-1.5 rounded-lg border border-blue-500/20">0
                  REGISTRADOS</span>
              </div>
            </div>
          </header>

          <div class="flex-1 px-4 lg:px-8 py-8 space-y-6 pb-40 w-full max-w-7xl mx-auto">
            <!-- Search -->
            <div class="relative max-w-[480px] mx-auto mb-8">
              <span
                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">search</span>
              <input id="operator-search"
                class="w-full pl-12 pr-4 h-14 bg-white/90 dark:bg-surface-dark border-0 shadow-sm rounded-xl text-base outline-none focus:ring-2 focus:ring-villalba-blue/50 transition-all font-bold text-slate-900 dark:text-white"
                placeholder="Buscar pedidos..." type="text" />
            </div>

            <!-- Status Tabs -->
            <div
              class="flex gap-2 bg-slate-100 dark:bg-surface-dark border border-slate-200 dark:border-slate-800 p-1.5 rounded-2xl mb-8 overflow-x-auto snap-x hide-scrollbar">
              <button id="tab-nuevas" onclick="window.switchTab('Pendiente')"
                class="tab-btn min-w-[120px] snap-center flex-1 py-3 px-4 rounded-xl flex flex-col items-center justify-center gap-1 bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 transition-all">
                <span class="text-[10px] font-black uppercase tracking-widest text-villalba-blue">Nuevas</span>
                <span id="tab-count-nuevas" class="text-sm font-bold text-slate-900 dark:text-white">00</span>
              </button>
              <button id="tab-revision" onclick="window.switchTab('En revisión')"
                class="tab-btn min-w-[120px] snap-center flex-1 py-3 px-4 rounded-xl flex flex-col items-center justify-center gap-1 hover:bg-slate-50 dark:hover:bg-slate-800/50 opacity-70 border border-transparent transition-all">
                <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">En revisión</span>
                <span id="tab-count-revision" class="text-sm font-bold text-slate-900 dark:text-white">00</span>
              </button>
              <button id="tab-aprobados" onclick="window.switchTab('Aprobado')"
                class="tab-btn min-w-[120px] snap-center flex-1 py-3 px-4 rounded-xl flex flex-col items-center justify-center gap-1 hover:bg-slate-50 dark:hover:bg-slate-800/50 opacity-70 border border-transparent transition-all">
                <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">Completadas</span>
                <span id="tab-count-aprobados" class="text-sm font-bold text-slate-900 dark:text-white">00</span>
              </button>
            </div>

            <!-- Priority Columns Container -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
              <!-- High Priority -->
              <div
                class="flex flex-col">
                <div
                  class="flex items-center justify-between mb-4 px-4 py-3 bg-white/95 dark:bg-surface-dark backdrop-blur-sm rounded-2xl shadow-sm border border-slate-200/50 dark:border-white/5">
                  <h2 class="text-sm font-black text-rose-500 uppercase tracking-widest flex items-center gap-2">
                    <span class="material-symbols-outlined text-[18px]">priority_high</span> <span
                      class="text-[10px] text-slate-400 font-bold uppercase mr-[-4px]">Prioridad:</span> Alta
                  </h2>
                  <span id="count-alta"
                    class="text-xs font-bold text-slate-500 bg-slate-100 dark:bg-slate-800 px-2.5 py-1 rounded-full">0</span>
                </div>
                <div id="orders-high" class="space-y-4">
                  <div class="py-10 flex justify-center"><span
                      class="material-symbols-outlined animate-spin text-4xl text-villalba-blue">sync</span></div>
                </div>
              </div>

              <!-- Medium Priority -->
              <div
                class="flex flex-col">
                <div
                  class="flex items-center justify-between mb-4 px-4 py-3 bg-white/95 dark:bg-surface-dark backdrop-blur-sm rounded-2xl shadow-sm border border-slate-200/50 dark:border-white/5">
                  <h2 class="text-sm font-black text-amber-500 uppercase tracking-widest flex items-center gap-2">
                    <span class="material-symbols-outlined text-[18px]">flag</span> <span
                      class="text-[10px] text-slate-400 font-bold uppercase mr-[-4px]">Prioridad:</span> Media
                  </h2>
                  <span id="count-media"
                    class="text-xs font-bold text-slate-500 bg-slate-100 dark:bg-slate-800 px-2.5 py-1 rounded-full">0</span>
                </div>
                <div id="orders-medium" class="space-y-4">
                  <div class="py-10 flex justify-center"><span
                      class="material-symbols-outlined animate-spin text-4xl text-villalba-blue">sync</span></div>
                </div>
              </div>

              <!-- Low Priority -->
              <div
                class="flex flex-col">
                <div
                  class="flex items-center justify-between mb-4 px-4 py-3 bg-white/95 dark:bg-surface-dark backdrop-blur-sm rounded-2xl shadow-sm border border-slate-200/50 dark:border-white/5">
                  <h2 class="text-sm font-black text-emerald-500 uppercase tracking-widest flex items-center gap-2">
                    <span class="material-symbols-outlined text-[18px]">low_priority</span> <span
                      class="text-[10px] text-slate-400 font-bold uppercase mr-[-4px]">Prioridad:</span> Baja
                  </h2>
                  <span id="count-baja"
                    class="text-xs font-bold text-slate-500 bg-slate-100 dark:bg-slate-800 px-2.5 py-1 rounded-full">0</span>
                </div>
                <div id="orders-low" class="space-y-4">
                  <div class="py-10 flex justify-center"><span
                      class="material-symbols-outlined animate-spin text-4xl text-villalba-blue">sync</span></div>
                </div>
              </div>
            </div>

            <div id="no-results-msg" class="hidden py-20 text-center text-slate-500 font-bold col-span-full w-full">No
              se encontraron pedidos.</div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="./js/gestion-pedidos.js" type="module"></script>
  <script type="module">import '../js/theme.js';</script>
</body>

</html>
